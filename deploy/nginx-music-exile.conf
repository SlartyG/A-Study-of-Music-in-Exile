# Nginx: veselov.xyz + musicexile.veselov.xyz
# Скопировать на VPS:
#   sudo cp deploy/nginx-music-exile.conf /etc/nginx/sites-available/music-exile
#   sudo ln -sf /etc/nginx/sites-available/music-exile /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d musicexile.veselov.xyz -d veselov.xyz -d www.veselov.xyz

server {
    listen 80;
    listen [::]:80;
    server_name musicexile.veselov.xyz veselov.xyz www.veselov.xyz;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
